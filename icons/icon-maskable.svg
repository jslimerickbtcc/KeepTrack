<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="circle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="circleShine" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background — no rounded corners, the OS handles masking -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Main circle — sized to fit the 80% safe zone -->
  <circle cx="256" cy="256" r="160" fill="url(#circle)"/>

  <!-- Glass highlight -->
  <ellipse cx="238" cy="190" rx="105" ry="72" fill="url(#circleShine)"/>

  <!-- Checkmark shadow -->
  <path d="M183 264 l48 53 l100 -106" fill="none" stroke="#3730a3" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Checkmark -->
  <path d="M183 260 l48 53 l100 -106" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
