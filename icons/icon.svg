<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <!-- Check circle gradient -->
    <linearGradient id="circle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Shine on circle -->
    <linearGradient id="circleShine" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow behind circle -->
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Outer glow -->
    <filter id="outerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24"/>
      <feOffset dx="0" dy="0"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.35"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background top shine -->
    <linearGradient id="bgShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bgShine)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.12"/>

  <!-- Glow layer -->
  <g filter="url(#outerGlow)">
    <circle cx="256" cy="256" r="185" fill="url(#circle)"/>
  </g>

  <!-- Main circle -->
  <circle cx="256" cy="256" r="185" fill="url(#circle)"/>

  <!-- Glass highlight on circle -->
  <ellipse cx="235" cy="175" rx="120" ry="85" fill="url(#circleShine)"/>

  <!-- Checkmark shadow -->
  <path d="M170 264 l56 62 l116 -124" fill="none" stroke="#3730a3" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Checkmark -->
  <path d="M170 260 l56 62 l116 -124" fill="none" stroke="white" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle bottom reflection -->
  <ellipse cx="256" cy="465" rx="130" ry="14" fill="#6366f1" opacity="0.06"/>
</svg>
